name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ruff + pyright + pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # PySide6 (the Qt simulator) needs these system libs even under the
      # offscreen platform plugin used in headless CI.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Pyright (strict)
        run: uv run pyright

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -q

  docs-build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Build docs (strict)
        run: uv run mkdocs build --strict
