name: Android emulator + wheel ABI

# Heavy Android jobs: they cross-compile native wheels (cibuildwheel + NDK) and
# boot a headless x86_64 emulator, so they do NOT run on every PR. Triggers:
#   - manual (workflow_dispatch),
#   - push to main touching the native/toolchain surface,
#   - a weekly cron (catch upstream drift in CPython/cibuildwheel/NDK).
#
# arm64 note: an arm64 GUEST cannot boot on an x86_64 host (the emulator PANICs —
# see docs/research/emulator-arm64-on-x86.md). So the emulator job validates the
# x86_64 runtime end-to-end; the arm64 wheel is validated structurally (ELF check)
# in `wheels-abi`. True arm64 runtime needs an arm64 host (device / arm64 runner).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "toolchain/**"
      - "android-host/**"
      - "tempestroid/native/**"
      - ".github/workflows/android-emulator.yml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: android-emulator-${{ github.ref }}
  cancel-in-progress: true

env:
  TEMPEST_NDK_VERSION: "27.3.13750724"

jobs:
  wheels-abi:
    name: cross-compile numpy wheels + assert ABI
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.TEMPEST_NDK_VERSION }}
        run: sdkmanager "ndk;${{ env.TEMPEST_NDK_VERSION }}"

      - name: Install cibuildwheel (>= 4.0)
        run: uv tool install "cibuildwheel>=4.1"

      - name: Cross-compile numpy wheels (arm64-v8a + x86_64)
        env:
          ANDROID_HOME_OVERRIDE: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.TEMPEST_NDK_VERSION }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          bash toolchain/build_numpy.sh arm64-v8a
          bash toolchain/build_numpy.sh x86_64

      - name: Assert wheel ABIs (aarch64 0xB7 / x86-64 0x3E)
        run: |
          uv run python - <<'PY'
          import glob, zipfile, sys
          want = {"arm64-v8a": 0xB7, "x86_64": 0x3E}
          for abi, machine in want.items():
              cibw = abi.replace("-", "_")
              hits = glob.glob(f"toolchain/dist/wheels-{abi}/numpy-*android_*_{cibw}.whl")
              assert hits, f"no numpy wheel for {abi}"
              z = zipfile.ZipFile(hits[0])
              so = next(n for n in z.namelist() if n.endswith(".so"))
              got = z.read(so)[18]
              print(f"{abi}: {so.split('/')[-1]} ELF machine={got:#x}")
              assert got == machine, f"{abi}: expected {machine:#x}, got {got:#x}"
          print("wheel ABIs OK")
          PY

      - name: Upload numpy wheels
        uses: actions/upload-artifact@v4
        with:
          name: numpy-android-wheels
          path: toolchain/dist/wheels-*/numpy-*.whl
          if-no-files-found: error

  emulator-vision:
    name: x86_64 emulator — vision stack end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.TEMPEST_NDK_VERSION }}
        run: sdkmanager "ndk;${{ env.TEMPEST_NDK_VERSION }}"

      - name: Add Rust android target (pydantic-core wheel)
        run: rustup target add x86_64-linux-android

      - name: Install cibuildwheel (>= 4.0)
        run: uv tool install "cibuildwheel>=4.1"

      - name: Build x86_64 native wheels (pydantic-core + numpy)
        env:
          ANDROID_HOME_OVERRIDE: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.TEMPEST_NDK_VERSION }}
          TEMPEST_ABI: x86_64
          # env.sh defaults TEMPEST_RUST_TARGET to aarch64 regardless of ABI; the
          # x86_64 pydantic-core build needs the x86_64 target for the preflight.
          TEMPEST_RUST_TARGET: x86_64-linux-android
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          bash toolchain/01_build_wheels.sh       # pydantic_core (also downloads the x86_64 CPython tarball)
          bash toolchain/build_numpy_x86.sh       # numpy
          # cibuildwheel's cache path varies by version/runner; locate the Android
          # CPython tarball it downloaded and hand it to the emulator step.
          tarball="$(find "$HOME" -name 'python-*-x86_64-linux-android.tar.gz' 2>/dev/null | head -1)"
          [ -n "$tarball" ] || { echo "x86_64 CPython Android tarball not found after wheel build"; exit 1; }
          echo "TEMPEST_X86_TARBALL=$tarball" >> "$GITHUB_ENV"
          echo "found CPython tarball: $tarball"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64

      - name: Emulator vision verify (VISION=1)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_HOME_OVERRIDE: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.TEMPEST_NDK_VERSION }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # The runner boots the emulator; emulator_verify.sh reuses it
          # (its `make emulator` no-ops when a device is already online).
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          # NOTE: the action runs `script:` with /bin/sh (dash) — no `pipefail`.
          # Keep this POSIX; the real work is in emulator_verify.sh (bash + its
          # own pipefail).
          script: |
            set -eu
            # emulator_verify.sh targets emulator-5554 and AVD pixel8_api34; the
            # runner's AVD is named "test" — point the script at what's running.
            EMU_SERIAL="$(adb devices | awk '/emulator/{print $1; exit}')"; export EMU_SERIAL
            AVD="$(${ANDROID_SDK_ROOT}/emulator/emulator -list-avds | head -1)"; export AVD
            # TEMPEST_X86_TARBALL is exported into the job env by the wheel-build step.
            echo "using CPython tarball: ${TEMPEST_X86_TARBALL:-<unset>}"
            VISION=1 bash toolchain/emulator_verify.sh examples/visionsmoke/app.py

      - name: Upload emulator screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-vision-screenshot
          path: docs/assets/emulator/verify.png
          if-no-files-found: warn

  build-arm64-apk:
    name: build arm64-v8a vision APK (x86_64 host — NDK is x86_64-only)
    # The Android NDK ships only an x86_64-hosted toolchain (no linux-aarch64), so
    # arm64 native artifacts (wheels + host .so + APK) MUST be built on an x86_64
    # host that cross-compiles to arm64. The arm64 runner can only run, not build.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.TEMPEST_NDK_VERSION }}
        run: sdkmanager "ndk;${{ env.TEMPEST_NDK_VERSION }}"

      - name: Add Rust android target (pydantic-core wheel)
        run: rustup target add aarch64-linux-android

      - name: Install cibuildwheel (>= 4.0)
        run: uv tool install "cibuildwheel>=4.1"

      - name: Build arm64-v8a vision APK (cross-compiled)
        env:
          ANDROID_HOME_OVERRIDE: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.TEMPEST_NDK_VERSION }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          # 1) arm64 native wheels (NDK x86_64 host → arm64 target). This also
          #    downloads + caches the official aarch64 CPython Android tarball.
          TEMPEST_ABI=arm64-v8a bash toolchain/01_build_wheels.sh   # pydantic_core
          bash toolchain/build_numpy_arm64.sh                       # numpy
          # 2) arm64 CPython prefix from that cached tarball (00_fetch_cpython is
          #    manual-only; mirror stage_emulator_runtime's extraction for arm64).
          tarball="$(find "$HOME" -name 'python-*-aarch64-linux-android.tar.gz' 2>/dev/null | head -1)"
          [ -n "$tarball" ] || { echo "aarch64 CPython Android tarball not found"; exit 1; }
          echo "arm64 CPython tarball: $tarball"
          prefix_dst="toolchain/dist/python/arm64-v8a"
          rm -rf "$prefix_dst"; mkdir -p "$prefix_dst"
          tmp="$(mktemp -d)"; tar -xzf "$tarball" -C "$tmp" ./prefix
          cp -a "$tmp/prefix/include" "$prefix_dst/include"
          cp -a "$tmp/prefix/lib" "$prefix_dst/lib"
          # 3) vision site-packages (pure-Python + the arm64 wheels).
          ( cd toolchain && TEMPEST_ABI=arm64-v8a TEMPEST_VISION=1 ./02_stage_deps.sh )
          # 3) the arm64 vision APK.
          ( cd android-host && ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" ANDROID_HOME="$ANDROID_SDK_ROOT" \
              ./gradlew :app:assembleDebug \
                -Ptempest.abi=arm64-v8a \
                -Ptempest.pythonPrefix=../toolchain/dist/python/arm64-v8a \
                -Ptempest.depsDir=../toolchain/dist/site-packages \
                -Ptempest.features=vision )

      - name: Upload arm64 vision APK
        uses: actions/upload-artifact@v4
        with:
          name: arm64-vision-apk
          path: android-host/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  emulator-vision-arm64:
    name: arm64 emulator — vision stack end-to-end (arm64 host)
    # An arm64 GUEST only boots on an arm64 HOST (it PANICs on x86_64). GitHub's
    # hosted arm64 Linux runner IS that host — it runs the pre-built arm64 APK
    # (it cannot BUILD it: the NDK is x86_64-only). This closes the arm64 runtime
    # gap the x86_64 job can't. Experimental (KVM on hosted arm64 runners is new)
    # → continue-on-error until proven stable.
    needs: build-arm64-apk
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (tempest serve; no NDK/build needed)
        run: uv sync

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK (skip obsolete 'tools' package)
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install SDK packages (platform-tools only — no NDK, no compile)
        run: sdkmanager "platform-tools"

      - name: Download the pre-built arm64 vision APK
        uses: actions/download-artifact@v4
        with:
          name: arm64-vision-apk
          path: android-host/app/build/outputs/apk/debug/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-arm64-v8a

      - name: Emulator vision verify (arm64, install-and-run only)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          script: |
            set -eu
            EMU_SERIAL="$(adb devices | awk '/emulator/{print $1; exit}')"; export EMU_SERIAL
            AVD="$(${ANDROID_SDK_ROOT}/emulator/emulator -list-avds | head -1)"; export AVD
            # EMU_SKIP_BUILD=1 → use the downloaded arm64 APK; just install + serve.
            EMU_ABI=arm64-v8a VISION=1 EMU_SKIP_BUILD=1 \
              bash toolchain/emulator_verify.sh examples/visionsmoke/app.py

      - name: Upload arm64 emulator screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-vision-arm64-screenshot
          path: docs/assets/emulator/verify.png
          if-no-files-found: warn
