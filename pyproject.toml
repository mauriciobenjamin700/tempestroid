[project]
name = "tempestroid"
version = "0.0.1"
description = "Framework for building native Android apps in typed Python — declarative typed UI tree, Qt simulator + Compose device renderers."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Mauricio Benjamin" }]
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
# Qt desktop simulator + asyncio integration (Trilho A, phases A3/A4).
qt = [
    "PySide6>=6.7",
    "qasync>=0.27",
]

[project.scripts]
tempest = "tempestroid.cli:main"

[dependency-groups]
# The Qt simulator is part of the dev/test loop, so its deps live here too and
# are installed by `uv sync` automatically. End users opt in via the `qt` extra
# (`pip install tempestroid[qt]`); the framework core needs neither.
dev = [
    "ruff>=0.6",
    "pyright>=1.1.380",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "PySide6>=6.7",
    "qasync>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tempestroid"]

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["src", "tests"]
# B-track scaffolding (Gradle/Kotlin/C + vendored build clones) is not framework
# Python; the quality gates must not touch it. See CLAUDE.md "Layout".
extend-exclude = ["toolchain", "android-host"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "Q", "ANN", "D"]
ignore = ["D203", "D213"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D", "ANN"]
"examples/*" = ["D"]

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.11"
typeCheckingMode = "strict"
reportMissingImports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
