android.useAndroidX=true
org.gradle.jvmargs=-Xmx2048m

# Path to the toolchain dist prefix (CPython + wheels). Override per machine.
# Consumed by app/build.gradle.kts to populate jniLibs/ and assets/.
tempest.pythonVersion=3.14
tempest.abi=arm64-v8a
tempest.pythonPrefix=../toolchain/dist/python/arm64-v8a
tempest.wheelsDir=../toolchain/dist/wheels
